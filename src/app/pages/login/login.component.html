<div class="page-wrap">
  <div class="auth-outer">
    <div class="auth-card">
      <div class="auth-left">
        <span class="auth-mascot">🐲</span>
        <div class="auth-big">Welcome<br/>back,<br/><em>Knight.</em></div>
        <p class="auth-desc">The dragon guards your measurement history. Prove yourself to enter the keep.</p>
      </div>
      <div class="auth-right">
        <h2>ENTER THE GATES</h2>
        <p class="sub">Speak your credentials, brave soul</p>
        <button class="google-btn" (click)="loginWithGoogle()">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          ⚔ ENTER VIA GOOGLE PORTAL
        </button>
        <div class="auth-divider"><span>OR</span></div>
        <div class="form-group">
          <label class="form-label">📜 YOUR EMAIL SCROLL</label>
          <input class="form-input" type="email" [(ngModel)]="email" placeholder="knight@realm.com"/>
          <span class="form-error" [class.show]="emailErr">{{emailErr}}</span>
        </div>
        <div class="form-group">
          <label class="form-label">🔑 SECRET PASSPHRASE</label>
          <input class="form-input" type="password" [(ngModel)]="password" placeholder="••••••••" (keydown.enter)="doLogin()"/>
          <span class="form-error" [class.show]="passErr">{{passErr}}</span>
        </div>
        <button class="auth-submit" (click)="doLogin()" [disabled]="loading">
          <span class="loader" *ngIf="loading"></span>
          <span *ngIf="!loading">🔥 ENTER THE REALM ↗</span>
        </button>
        <div class="auth-switch">Forgot your passphrase? <a routerLink="/forgot-password">RECOVER IT</a></div>
        <div class="auth-switch">No account yet? <a routerLink="/register">JOIN THE KINGDOM</a></div>
      </div>
    </div>
  </div>
</div>
