<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/png" sizes="192x192" href="favicon.png"/>
<link rel="icon" type="image/png" sizes="96x96" href="favicon.png"/>
<link rel="icon" type="image/png" sizes="96x96" href="favicon.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="favicon.png"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign in — Quantra</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
<link rel="stylesheet" href="css/style.css"/>
<style>
.pw-wrap{position:relative;display:flex;align-items:center;}
.pw-wrap .form-input{flex:1;padding-right:44px;}
.pw-toggle{position:absolute;right:12px;background:none;border:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;padding:0;transition:color .2s;}
.pw-toggle:hover{color:var(--accent);}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div class="grid-bg"></div>

<nav id="navbar">
  <a class="nav-logo" href="index.html"><img src="icon.png" alt="Quantra" class="nav-logo-img"/></a>
  <div class="nav-tabs">
    <a class="nav-tab" data-page="home" href="index.html">Home</a>
    <a class="nav-tab" data-page="ops" href="operations.html">Operations</a>
    <a class="nav-tab" data-page="dashboard" href="dashboard.html">Dashboard</a>
    <a class="nav-tab" data-page="profile" href="profile.html">Profile</a>
  </div>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div class="page-wrap" style="display:flex;align-items:center;justify-content:center">
  <div class="auth-wrap">
    <div class="auth-left">
      <div class="auth-left-bg"></div>
      <div class="auth-big">Welcome<br/><em>back.</em></div>
      <p class="auth-desc">Sign in to access your measurement history, personal dashboard, and precision calculation tools.</p>
    </div>
    <div class="auth-right">
      <h2>Sign in</h2>
      <p class="sub">Enter your credentials to continue</p>

      <!-- Google OAuth -->
      <button class="google-btn" onclick="loginWithGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider"><span>OR</span></div>

      <div class="form-group">
        <label class="form-label">EMAIL</label>
        <input class="form-input" type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
        <span class="form-error" id="login-email-err"></span>
      </div>
      <div class="form-group">
        <label class="form-label">PASSWORD</label>
        <div class="pw-wrap"><input class="form-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/><button class="pw-toggle" type="button" onclick="togglePw('login-password',this)" tabindex="-1"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
        <span class="form-error" id="login-pass-err"></span>
      </div>
      <div style="text-align:right;margin-top:-12px;margin-bottom:20px"><a href="forgot-password.html" style="font-size:12px;color:var(--text2);text-decoration:none;font-family:var(--font-mono);transition:color .2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">Forgot password?</a></div>
      <button class="auth-submit" id="login-btn" onclick="doLogin()">Sign in</button>
      <div class="auth-switch">Don't have an account? <a href="register.html">Create one</a></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
// Redirect if already logged in
document.addEventListener('DOMContentLoaded', () => {
  if (isAuthed()) location.href = 'operations.html';
});
</script>
<script src="js/pw-toggle.js"></script>
</body>
</html>
