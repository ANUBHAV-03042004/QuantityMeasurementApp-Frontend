<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/png" sizes="192x192" href="favicon.png"/>
<link rel="icon" type="image/png" sizes="96x96" href="favicon.png"/>
<link rel="icon" type="image/png" sizes="96x96" href="favicon.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="favicon.png"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Operations — Quantra</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div class="grid-bg"></div>

<nav id="navbar">
  <a class="nav-logo" href="index.html"><img src="icon.png" alt="Quantra" class="nav-logo-img"/></a>
  <div class="nav-tabs">
    <a class="nav-tab" data-page="home" href="index.html">Home</a>
    <a class="nav-tab" data-page="ops" href="operations.html">Operations</a>
    <a class="nav-tab" data-page="dashboard" href="dashboard.html">Dashboard</a>
    <a class="nav-tab" data-page="profile" href="profile.html">Profile</a>
  </div>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div class="page-wrap">
  <div class="ops-layout">
    <!-- Sidebar -->
    <aside class="ops-sidebar">
      <h3>OPERATIONS</h3>
      <button class="op-btn active" data-op="COMPARE" onclick="selectOp(this,'COMPARE')"><span class="op-dot"></span>Compare</button>
      <button class="op-btn" data-op="CONVERT"  onclick="selectOp(this,'CONVERT')"><span class="op-dot"></span>Convert</button>
      <button class="op-btn" data-op="ADD"       onclick="selectOp(this,'ADD')"><span class="op-dot"></span>Add</button>
      <button class="op-btn" data-op="SUBTRACT"  onclick="selectOp(this,'SUBTRACT')"><span class="op-dot"></span>Subtract</button>
      <button class="op-btn" data-op="DIVIDE"    onclick="selectOp(this,'DIVIDE')"><span class="op-dot"></span>Divide</button>

      <h3 style="margin-top:28px">HISTORY FILTER</h3>
      <button class="type-btn active" data-filter="ALL"      onclick="selectFilter(this,'ALL')">All operations</button>
      <button class="type-btn" data-filter="COMPARE"  onclick="selectFilter(this,'COMPARE')">COMPARE</button>
      <button class="type-btn" data-filter="CONVERT"  onclick="selectFilter(this,'CONVERT')">CONVERT</button>
      <button class="type-btn" data-filter="ADD"      onclick="selectFilter(this,'ADD')">ADD</button>
      <button class="type-btn" data-filter="SUBTRACT" onclick="selectFilter(this,'SUBTRACT')">SUBTRACT</button>
      <button class="type-btn" data-filter="DIVIDE"   onclick="selectFilter(this,'DIVIDE')">DIVIDE</button>
      <button class="type-btn" data-filter="ERRORED"  onclick="selectFilter(this,'ERRORED')">Errors only</button>
    </aside>

    <!-- Main content -->
    <main class="ops-main">
      <div class="ops-header">
        <div class="ops-title" id="op-title">Compare</div>
        <div class="ops-desc" id="op-desc">Check if two quantities are equal</div>
      </div>

      <!-- Operation form — accessible to everyone -->
      <div class="op-form-card">
        <div class="operands-grid">
          <div class="operand-block">
            <label class="form-label">FIRST QUANTITY</label>
            <div class="input-row">
              <input class="form-input" type="number" id="val1" placeholder="0" step="any"/>
              <select class="form-select" id="unit1"></select>
            </div>
          </div>
          <div class="op-symbol" id="op-symbol">=?</div>
          <div class="operand-block" id="second-operand">
            <label class="form-label">SECOND QUANTITY</label>
            <div class="input-row">
              <input class="form-input" type="number" id="val2" placeholder="0" step="any"/>
              <select class="form-select" id="unit2"></select>
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div>
            <label class="form-label">MEASUREMENT TYPE</label>
            <select class="form-select" id="mtype" onchange="updateUnits()" style="width:190px">
              <option value="LengthUnit">Length</option>
              <option value="WeightUnit">Weight</option>
              <option value="VolumeUnit">Volume</option>
              <option value="TemperatureUnit">Temperature</option>
            </select>
          </div>
          <button class="run-btn" id="run-btn" onclick="runOperation()" style="margin-top:22px">Run operation</button>
        </div>
      </div>

      <!-- Result -->
      <div class="result-card" id="result-card">
        <div class="result-label">RESULT</div>
        <div class="result-value" id="result-value">—</div>
        <div class="result-unit" id="result-unit"></div>
        <div class="result-meta" id="result-meta"></div>
      </div>

      <!-- History section — shows gate if not logged in, table if logged in -->
      <div class="history-section">
        <div class="history-header">
          <div class="history-title">Operation history</div>
          <div>
            <button class="btn" style="padding:6px 14px;font-size:12px" onclick="isAuthed() ? loadHistory() : null">↻ Refresh</button>
          </div>
        </div>
        <div id="history-wrap">
          <div class="history-empty">Loading…</div>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/operations.js"></script>
</body>
</html>
