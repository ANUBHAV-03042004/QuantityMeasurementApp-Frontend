<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/png" href="icon.png"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Signing in… — Quantra</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@0,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
.cb-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;text-align:center;padding:40px}
.cb-spinner{width:48px;height:48px;border:3px solid rgba(200,255,0,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.cb-title{font-size:28px;font-weight:800;letter-spacing:-1px}
.cb-sub{color:var(--text2);font-size:14px;font-family:var(--font-mono)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="cb-wrap">
  <div class="cb-spinner"></div>
  <div class="cb-title" id="cb-title">Signing you in…</div>
  <div class="cb-sub" id="cb-sub">Please wait</div>
</div>

<script>
(function () {
  // The backend's OAuth2SuccessHandler redirects here as:
  // /oauth2-callback.html?token=<jwt>
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (!token) {
    document.getElementById('cb-title').textContent = 'Sign-in failed';
    document.getElementById('cb-sub').textContent   = 'No token received — redirecting to login…';
    setTimeout(() => location.href = 'login.html', 2000);
    return;
  }

  // Decode the JWT payload (base64url) to extract email + role
  try {
    const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    const email   = payload.sub  || payload.email || '';
    const role    = payload.role || 'USER';

    localStorage.setItem('qm_token', token);
    localStorage.setItem('qm_user',  JSON.stringify({ email, role }));

    document.getElementById('cb-sub').textContent = `Welcome, ${email}`;
  } catch (_) {
    // If decode fails, still store token and navigate
    localStorage.setItem('qm_token', token);
  }

  setTimeout(() => location.href = 'operations.html', 800);
})();
</script>
</body>
</html>
